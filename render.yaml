services:
  - type: web
    name: believe-fitness-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SQLITE_STORAGE
        value: /var/data/database.sqlite3
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1